# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "ChatGPT"
  - "Gemini"
  - "OpenCode"

ai_usage_summary: |
  - ChatGPT: Used for project planning, architecture design, and determining the
    right steps and measures for the ranking pipeline. Helped decide scoring signals,
    honeypot detection strategy, and evaluation approach.
  - Google Gemini: Used in Google Colab to test code and produce output before
    moving to VS Code. Validated embedding generation, FAISS indexing, and
    scoring logic in an interactive notebook environment.
  - OpenCode: Used for translating code from Jupyter notebooks into production
    Python scripts (rank.py, precompute.py) in VS Code.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-stage pipeline: (1) FAISS inner-product retrieval of top-2000 candidates
  using BAAI/bge-small-en-v1.5 embeddings of candidate profiles against the JD
  embedding, (2) multi-signal re-ranking over 11 weighted components including
  semantic similarity, experience fit, retrieval/production keywords, company type,
  availability signals, skill match, platform assessments, title relevance, LLM
  experience, and moderate research presence. Honeypot detection filters impossible
  profiles. Reasoning is generated from JD-aware analysis of each candidate's
  specific background, concerns, and fit. Runtime ~3min on CPU, 16GB RAM.

